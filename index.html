<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple JavaScript Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
      :root {
        --sky: #67c8ff;
        --deep-sky: #2f8ee6;
        --brick: #c95824;
        --brick-dark: #8c361a;
        --grass: #38b83f;
        --ground: #b76425;
        --ink: #20130b;
        --gold: #ffd64a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
        background:
          linear-gradient(90deg, rgba(255,255,255,.9) 0 46px, transparent 46px 100%) 10% 110px / 90px 28px no-repeat,
          linear-gradient(90deg, rgba(255,255,255,.9) 0 62px, transparent 62px 100%) 13% 138px / 120px 28px no-repeat,
          linear-gradient(90deg, rgba(255,255,255,.9) 0 38px, transparent 38px 100%) 78% 130px / 80px 24px no-repeat,
          linear-gradient(90deg, rgba(255,255,255,.9) 0 76px, transparent 76px 100%) 82% 158px / 140px 30px no-repeat,
          linear-gradient(180deg, #95dcff 0%, var(--sky) 45%, var(--deep-sky) 100%);
        image-rendering: pixelated;
        overflow-x: hidden;
        position: relative;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        left: 0;
        right: 0;
        pointer-events: none;
        z-index: -1;
      }

      body::before {
        bottom: 86px;
        height: 118px;
        background:
          linear-gradient(135deg, transparent 0 46%, #49bf52 47% 64%, transparent 65%) 8% 100% / 220px 118px no-repeat,
          linear-gradient(135deg, transparent 0 43%, #2d9c40 44% 66%, transparent 67%) 78% 100% / 250px 118px no-repeat,
          linear-gradient(90deg, #1a8f3a 0 22px, #35c451 22px 86px, #14782f 86px 108px) 92% 92% / 108px 96px no-repeat,
          linear-gradient(#35c451 0 16px, #1a8f3a 16px 100%) 92% 20% / 128px 28px no-repeat;
      }

      body::after {
        bottom: 0;
        height: 86px;
        background:
          linear-gradient(var(--grass) 0 16px, transparent 16px),
          linear-gradient(90deg, rgba(255,255,255,.22) 0 4px, transparent 4px 32px),
          linear-gradient(var(--ground) 0 100%);
        background-size: auto, 32px 32px, auto;
        border-top: 6px solid #176b2b;
        box-shadow: inset 0 14px 0 rgba(255,255,255,.16);
      }

      .page-shell {
        padding-bottom: 120px;
      }

      .pixel-header {
        margin: 24px auto 18px;
        padding: 14px;
        max-width: 1120px;
        background:
          linear-gradient(90deg, var(--brick-dark) 0 6px, transparent 6px 100%) 0 0 / 28px 28px,
          linear-gradient(var(--brick-dark) 0 6px, transparent 6px 100%) 0 0 / 28px 28px,
          var(--brick);
        border: 6px solid var(--ink);
        box-shadow: 0 8px 0 rgba(32, 19, 11, .35);
      }

      .header-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 86px;
        padding: 18px 24px;
        background: #fff2a3;
        border: 5px solid var(--ink);
        box-shadow: inset 0 -8px 0 #f1b93e;
      }

      .games-heading {
        margin: 0;
        color: #e33a25;
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-shadow:
          3px 3px 0 #fff,
          6px 6px 0 var(--ink);
      }

      .coin-row {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
      }

      .coin {
        width: 28px;
        aspect-ratio: 1;
        background: var(--gold);
        border: 4px solid var(--ink);
        box-shadow: inset -5px -5px 0 #e09c24;
      }

      .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 24px;
        max-width: 1120px;
        margin: 30px auto 0;
      }

      .card {
        width: 100%;
        overflow: hidden;
        background: #fff8df;
        border: 5px solid var(--ink);
        border-radius: 0;
        box-shadow: 8px 8px 0 rgba(32, 19, 11, .32);
        transition: transform .16s ease, box-shadow .16s ease;
      }

      .card:hover {
        transform: translate(-3px, -5px);
        box-shadow: 12px 14px 0 rgba(32, 19, 11, .28);
      }

      .card-img-top {
        width: 100%;
        height: 210px;
        object-fit: cover;
        border-bottom: 5px solid var(--ink);
        image-rendering: pixelated;
      }

      .card-body {
        display: flex;
        min-height: 132px;
        flex-direction: column;
        justify-content: space-between;
        gap: 18px;
        padding: 18px;
      }

      .card-title {
        margin: 0;
        font-size: 1.18rem;
        font-weight: 900;
      }

      .btn-primary {
        align-self: stretch;
        color: #fff;
        font-weight: 900;
        text-transform: uppercase;
        background: #e33a25;
        border: 4px solid var(--ink);
        border-radius: 0;
        box-shadow: inset 0 -5px 0 #9f2215;
      }

      .btn-primary:hover,
      .btn-primary:focus {
        background: #ffb72e;
        color: var(--ink);
        border-color: var(--ink);
        box-shadow: inset 0 -5px 0 #d17c15;
      }

      @media (max-width: 640px) {
        .pixel-header {
          margin-top: 14px;
          padding: 10px;
        }

        .header-bar {
          align-items: flex-start;
          flex-direction: column;
          padding: 16px;
        }

        .coin-row {
          gap: 8px;
        }

        .coin {
          width: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main class="container page-shell">
        <header class="pixel-header" aria-label="Games arcade header">
          <div class="header-bar">
            <h1 class="games-heading">Simple JavaScript Games</h1>
            <div class="coin-row" aria-hidden="true">
              <span class="coin"></span>
              <span class="coin"></span>
              <span class="coin"></span>
            </div>
          </div>
        </header>
    
        <div class="card-container">
            <div class="card">
                <img src="images/1.png" class="card-img-top" alt="2048 Game">
                <div class="card-body">
                  <h5 class="card-title">2048 Game</h5>
                  <a href="2048 Game/index.html" class="btn btn-primary">Tap to Play</a>
                </div>
            </div>
            <div class="card">
              <img src="images/2.png" class="card-img-top" alt="Breakout Game">
              <div class="card-body">
                <h5 class="card-title">Breakout Game</h5>
                <a href="Breakout Game/index.html" class="btn btn-primary">Tap to Play</a>
              </div>
          </div>
          <div class="card">
            <img src="images/3.png" class="card-img-top" alt="CatchtheBall Game">
            <div class="card-body">
              <h5 class="card-title">Catch the Ball Game</h5>
              <a href="Catch the Ball/index.html" class="btn btn-primary">Tap to Play</a>
            </div>
        </div>
        <div class="card">
          <img src="images/4.png" class="card-img-top" alt="FlappyBird Game">
          <div class="card-body">
            <h5 class="card-title">Flappy Bird Game</h5>
            <a href="Flappy Bird/index.html" class="btn btn-primary">Tap to Play</a>
          </div>
      </div>
      <div class="card">
        <img src="images/5.png" class="card-img-top" alt="Memory Game">
        <div class="card-body">
          <h5 class="card-title">Memory Game</h5>
          <a href="Memory Game/index.html" class="btn btn-primary">Tap to Play</a>
        </div>
    </div>
    <div class="card">
      <img src="images/6.png" class="card-img-top" alt="Pong Game">
      <div class="card-body">
        <h5 class="card-title">Pong Game</h5>
        <a href="Pong Game/index.html" class="btn btn-primary">Tap to Play</a>
      </div>
  </div>
  <div class="card">
    <img src="images/7.png" class="card-img-top" alt="RockPaperScissors Game">
    <div class="card-body">
      <h5 class="card-title">Rock-Paper-Scissors Game</h5>
      <a href="Rock-Paper-Scissors/index.html" class="btn btn-primary">Tap to Play</a>
    </div>
</div>
<div class="card">
  <img src="images/8.png" class="card-img-top" alt="TicTacToe Game">
  <div class="card-body">
    <h5 class="card-title">Tic-Tac-Toe Game</h5>
    <a href="Tic-Tac-Toe/index.html" class="btn btn-primary">Tap to Play</a>
  </div>
</div>

            <!-- Add more cards here as needed -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
