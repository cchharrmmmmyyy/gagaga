<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple JavaScript Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
      :root {
        --sky: #67c8ff;
        --deep-sky: #2f8ee6;
        --brick: #c95824;
        --brick-dark: #8c361a;
        --grass: #38b83f;
        --ground: #b76425;
        --ink: #20130b;
        --gold: #ffd64a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
        background:
          linear-gradient(90deg, rgba(255,255,255,.9) 0 46px, transparent 46px 100%) 10% 110px / 90px 28px no-repeat,
          linear-gradient(90deg, rgba(255,255,255,.9) 0 62px, transparent 62px 100%) 13% 138px / 120px 28px no-repeat,
          linear-gradient(90deg, rgba(255,255,255,.9) 0 38px, transparent 38px 100%) 78% 130px / 80px 24px no-repeat,
          linear-gradient(90deg, rgba(255,255,255,.9) 0 76px, transparent 76px 100%) 82% 158px / 140px 30px no-repeat,
          linear-gradient(180deg, #95dcff 0%, var(--sky) 45%, var(--deep-sky) 100%);
        image-rendering: pixelated;
        overflow-x: hidden;
        position: relative;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        left: 0;
        right: 0;
        pointer-events: none;
        z-index: -1;
      }

      body::before {
        bottom: 86px;
        height: 118px;
        background:
          linear-gradient(135deg, transparent 0 46%, #49bf52 47% 64%, transparent 65%) 8% 100% / 220px 118px no-repeat,
          linear-gradient(135deg, transparent 0 43%, #2d9c40 44% 66%, transparent 67%) 78% 100% / 250px 118px no-repeat,
          linear-gradient(90deg, #1a8f3a 0 22px, #35c451 22px 86px, #14782f 86px 108px) 92% 92% / 108px 96px no-repeat,
          linear-gradient(#35c451 0 16px, #1a8f3a 16px 100%) 92% 20% / 128px 28px no-repeat;
      }

      body::after {
        bottom: 0;
        height: 86px;
        background:
          linear-gradient(var(--grass) 0 16px, transparent 16px),
          linear-gradient(90deg, rgba(255,255,255,.22) 0 4px, transparent 4px 32px),
          linear-gradient(var(--ground) 0 100%);
        background-size: auto, 32px 32px, auto;
        border-top: 6px solid #176b2b;
        box-shadow: inset 0 14px 0 rgba(255,255,255,.16);
      }

      .page-shell {
        padding-bottom: 120px;
      }

      .pixel-header {
        margin: 24px auto 18px;
        padding: 14px;
        max-width: 1120px;
        background:
          linear-gradient(90deg, var(--brick-dark) 0 6px, transparent 6px 100%) 0 0 / 28px 28px,
          linear-gradient(var(--brick-dark) 0 6px, transparent 6px 100%) 0 0 / 28px 28px,
          var(--brick);
        border: 6px solid var(--ink);
        box-shadow: 0 8px 0 rgba(32, 19, 11, .35);
      }

      .header-bar {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 86px;
        padding: 18px 24px;
        background: #fff2a3;
        border: 5px solid var(--ink);
        box-shadow: inset 0 -8px 0 #f1b93e;
      }

      .games-heading {
        margin: 0;
        color: #e33a25;
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-shadow:
          3px 3px 0 #fff,
          6px 6px 0 var(--ink);
      }

      .coin-row {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
      }

      .coin {
        width: 28px;
        aspect-ratio: 1;
        background: var(--gold);
        border: 4px solid var(--ink);
        box-shadow: inset -5px -5px 0 #e09c24;
      }

      .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 24px;
        max-width: 1120px;
        margin: 30px auto 0;
      }

      .card {
        width: 100%;
        overflow: hidden;
        background: #fff8df;
        border: 5px solid var(--ink);
        border-radius: 0;
        box-shadow: 8px 8px 0 rgba(32, 19, 11, .32);
        transition: transform .16s ease, box-shadow .16s ease;
      }

      .card:hover {
        transform: translate(-3px, -5px);
        box-shadow: 12px 14px 0 rgba(32, 19, 11, .28);
      }

      .card-img-top {
        width: 100%;
        height: 210px;
        object-fit: cover;
        border-bottom: 5px solid var(--ink);
        image-rendering: pixelated;
      }

      .card-body {
        display: flex;
        min-height: 132px;
        flex-direction: column;
        justify-content: space-between;
        gap: 18px;
        padding: 18px;
      }

      .card-title {
        margin: 0;
        font-size: 1.18rem;
        font-weight: 900;
      }

      .btn-primary {
        align-self: stretch;
        color: #fff;
        font-weight: 900;
        text-transform: uppercase;
        background: #e33a25;
        border: 4px solid var(--ink);
        border-radius: 0;
        box-shadow: inset 0 -5px 0 #9f2215;
      }

      .btn-primary:hover,
      .btn-primary:focus {
        background: #ffb72e;
        color: var(--ink);
        border-color: var(--ink);
        box-shadow: inset 0 -5px 0 #d17c15;
      }

      @media (max-width: 640px) {
        .pixel-header {
          margin-top: 14px;
          padding: 10px;
        }

        .header-bar {
          align-items: flex-start;
          flex-direction: column;
          padding: 16px;
        }

        .coin-row {
          gap: 8px;
        }

        .coin {
          width: 22px;
        }
      }

      /* ===== 动画与背景装饰 ===== */

      .background-scene {
        position: fixed;
        inset: 0;
        z-index: -4;
        pointer-events: none;
        overflow: hidden;
      }

      .cloud {
        position: absolute;
        width: 180px;
        height: 54px;
        opacity: .82;
        animation: cloudMove linear infinite;
      }
      .cloud::before,
      .cloud::after,
      .cloud span {
        content: "";
        position: absolute;
        background: rgba(255,255,255,.92);
        box-shadow: 0 0 0 4px rgba(255,255,255,.08);
      }
      .cloud::before { width: 64px; height: 34px; left: 16px; top: 16px; }
      .cloud::after  { width: 84px; height: 40px; left: 54px; top: 8px; }
      .cloud span    { width: 54px; height: 28px; left: 122px; top: 18px; }
      .cloud.cloud-1 { top: 12%; left: -220px; animation-duration: 22s; }
      .cloud.cloud-2 { top: 24%; left: -260px; animation-duration: 30s; animation-delay: -8s; transform: scale(1.2); }
      .cloud.cloud-3 { top: 34%; left: -190px; animation-duration: 26s; animation-delay: -15s; transform: scale(.9); }

      @keyframes cloudMove {
        from { transform: translateX(0); }
        to   { transform: translateX(calc(100vw + 380px)); }
      }

      .floating-coins {
        position: fixed;
        inset: 0;
        z-index: -3;
        pointer-events: none;
        overflow: hidden;
      }
      .floating-coins span {
        position: absolute;
        width: 22px;
        height: 22px;
        border: 4px solid var(--ink);
        background: var(--gold);
        box-shadow: inset -5px -4px 0 #b96f16;
        animation: coinFloat 4s ease-in-out infinite;
      }
      .floating-coins span:nth-child(1) { left: 10%; top: 28%; animation-delay: .1s; }
      .floating-coins span:nth-child(2) { left: 84%; top: 22%; animation-delay: .6s; }
      .floating-coins span:nth-child(3) { left: 16%; top: 52%; animation-delay: 1.1s; }
      .floating-coins span:nth-child(4) { left: 88%; top: 56%; animation-delay: 1.8s; }
      .floating-coins span:nth-child(5) { left: 47%; top: 16%; animation-delay: 2.3s; }

      @keyframes coinFloat {
        0%, 100% { transform: translateY(0) rotateY(0deg); }
        50% { transform: translateY(-16px) rotateY(180deg); }
      }

      .mushroom {
        position: absolute;
        width: 62px;
        height: 62px;
        animation: mushroomTravel linear infinite;
      }
      .mushroom .cap {
        position: absolute;
        left: 8px; top: 12px;
        width: 46px; height: 26px;
        background: #ef3d2f;
        border: 4px solid var(--ink);
        border-bottom: 0;
        border-radius: 12px 12px 6px 6px;
        box-shadow: inset -6px -4px 0 #c8221a;
      }
      .mushroom .spot {
        position: absolute;
        width: 10px; height: 10px;
        background: #fff8f1;
        border: 2px solid var(--ink);
      }
      .mushroom .spot.s1 { left: 17px; top: 19px; }
      .mushroom .spot.s2 { left: 31px; top: 16px; }
      .mushroom .spot.s3 { left: 39px; top: 27px; }
      .mushroom .face {
        position: absolute;
        left: 17px; top: 36px;
        width: 28px; height: 18px;
        background: #f2d7b6;
        border: 4px solid var(--ink);
        border-top: 0;
      }
      .mushroom .eye {
        position: absolute;
        top: 6px;
        width: 4px; height: 8px;
        background: var(--ink);
      }
      .mushroom .eye.e1 { left: 8px; }
      .mushroom .eye.e2 { right: 8px; }
      .mushroom.m1 { top: 18%; left: -90px; animation-duration: 16s; }
      .mushroom.m2 { top: 40%; left: -120px; animation-duration: 21s; animation-delay: -7s; transform: scale(.95); }
      .mushroom.m3 { top: 58%; left: -100px; animation-duration: 18s; animation-delay: -11s; transform: scale(1.08); }

      @keyframes mushroomTravel {
        0%   { transform: translateX(0) translateY(0); }
        25%  { transform: translateX(28vw) translateY(-14px); }
        50%  { transform: translateX(56vw) translateY(8px); }
        75%  { transform: translateX(82vw) translateY(-10px); }
        100% { transform: translateX(calc(100vw + 220px)) translateY(5px); }
      }

      .pixel-house {
        position: absolute;
        bottom: 104px;
        width: 118px; height: 100px;
      }
      .pixel-house .roof {
        position: absolute;
        left: 8px; top: 0;
        width: 102px; height: 34px;
        background: #d6492b;
        border: 5px solid var(--ink);
        clip-path: polygon(50% 0, 100% 100%, 0 100%);
      }
      .pixel-house .body {
        position: absolute;
        left: 14px; bottom: 0;
        width: 90px; height: 68px;
        background: #ffd67e;
        border: 5px solid var(--ink);
        box-shadow: inset -8px -8px 0 #efb94d;
      }
      .pixel-house .door {
        position: absolute;
        left: 41px; bottom: 0;
        width: 22px; height: 31px;
        background: #9b5a29;
        border: 4px solid var(--ink);
      }
      .pixel-house .window {
        position: absolute;
        top: 18px;
        width: 18px; height: 18px;
        background: #8cecff;
        border: 4px solid var(--ink);
      }
      .pixel-house .window.w1 { left: 12px; }
      .pixel-house .window.w2 { right: 12px; }
      .pixel-house.h1 { left: 7%; transform: scale(.92); }
      .pixel-house.h2 { right: 10%; transform: scale(1.08); }

      .pipe {
        position: absolute;
        bottom: 92px;
        width: 112px; height: 118px;
        background: linear-gradient(90deg, #117133 0 18px, #27c94d 18px 86px, #117133 86px 100%);
        border: 5px solid var(--ink);
        border-top: 0;
      }
      .pipe::before {
        content: "";
        position: absolute;
        left: -11px; right: -11px; top: -28px;
        height: 28px;
        background: linear-gradient(90deg, #117133 0 18px, #38e25d 18px calc(100% - 18px), #117133 calc(100% - 18px));
        border: 5px solid var(--ink);
      }
      .pipe.p1 { left: 26%; transform: scale(.9); }
      .pipe.p2 { right: 21%; transform: scale(1.05); }

      .brick-strip {
        position: absolute;
        top: 16%;
        right: 14%;
        display: flex;
        gap: 10px;
      }
      .brick, .question-block {
        width: 44px; height: 44px;
        border: 5px solid var(--ink);
        position: relative;
      }
      .brick {
        background:
          linear-gradient(90deg, rgba(0,0,0,.2) 0 4px, transparent 4px 100%) 0 0 / 20px 100%,
          linear-gradient(rgba(0,0,0,.18) 0 4px, transparent 4px 100%) 0 0 / 100% 20px,
          linear-gradient(135deg, #f0833b, #c95824 56%, #8c361a);
      }
      .question-block {
        background: var(--gold);
        box-shadow: inset -6px -6px 0 #b96f16;
        animation: blockBounce 1.6s ease-in-out infinite;
      }
      .question-block::after {
        content: "?";
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 1.35rem;
        font-weight: 1000;
        text-shadow: 2px 2px 0 var(--ink);
      }

      @keyframes blockBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .header-bar::before {
        content: "?";
        position: absolute;
        right: 80px;
        top: 50%;
        width: 44px; height: 44px;
        transform: translateY(-50%);
        display: grid;
        place-items: center;
        border: 5px solid var(--ink);
        background: var(--gold);
        color: #fff;
        font-size: 1.55rem;
        font-weight: 900;
        text-shadow: 2px 2px 0 var(--ink);
        box-shadow: inset -6px -6px 0 #b96f16;
        animation: questionBounce 1.45s ease-in-out infinite;
      }

      @keyframes questionBounce {
        0%, 100% { transform: translateY(-50%); }
        50% { transform: translateY(calc(-50% - 8px)); }
      }

      .card {
        animation: cardDrop .42s ease both;
      }
      .card:nth-child(1) { animation-delay: .04s; }
      .card:nth-child(2) { animation-delay: .08s; }
      .card:nth-child(3) { animation-delay: .12s; }
      .card:nth-child(4) { animation-delay: .16s; }
      .card:nth-child(5) { animation-delay: .20s; }
      .card:nth-child(6) { animation-delay: .24s; }
      .card:nth-child(7) { animation-delay: .28s; }
      .card:nth-child(8) { animation-delay: .32s; }

      @keyframes cardDrop {
        0% { opacity: 0; transform: translateY(-30px) scale(.96); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      .card:hover {
        transform: translate(-4px, -8px) scale(1.015);
        box-shadow: 14px 16px 0 rgba(32,19,11,.28);
        filter: saturate(1.16);
      }
      .card:hover .card-img-top {
        transform: scale(1.06);
      }

      .play-arrow {
        display: inline-block;
        transition: transform .16s ease;
      }
      .btn-primary:hover .play-arrow {
        transform: translateX(6px);
      }

      @media (max-width: 780px) {
        .header-bar::before {
          right: 22px;
          top: 22px;
          transform: none;
        }
        @keyframes questionBounce {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-8px); }
        }
        .brick-strip { display: none; }
        .pixel-house, .pipe { transform: scale(.8); }
      }

      @media (max-width: 520px) {
        .pixel-house, .pipe { opacity: .55; }
      }

      .card-img-top {
        transition: transform .24s ease;
      }
    </style>
  </head>
  <body>
    <div class="background-scene" aria-hidden="true">
      <div class="cloud cloud-1"><span></span></div>
      <div class="cloud cloud-2"><span></span></div>
      <div class="cloud cloud-3"><span></span></div>

      <div class="mushroom m1">
        <div class="cap"></div>
        <div class="spot s1"></div>
        <div class="spot s2"></div>
        <div class="spot s3"></div>
        <div class="face"><span class="eye e1"></span><span class="eye e2"></span></div>
      </div>
      <div class="mushroom m2">
        <div class="cap"></div>
        <div class="spot s1"></div>
        <div class="spot s2"></div>
        <div class="spot s3"></div>
        <div class="face"><span class="eye e1"></span><span class="eye e2"></span></div>
      </div>
      <div class="mushroom m3">
        <div class="cap"></div>
        <div class="spot s1"></div>
        <div class="spot s2"></div>
        <div class="spot s3"></div>
        <div class="face"><span class="eye e1"></span><span class="eye e2"></span></div>
      </div>

      <div class="pixel-house h1">
        <div class="roof"></div>
        <div class="body">
          <div class="window w1"></div>
          <div class="window w2"></div>
          <div class="door"></div>
        </div>
      </div>
      <div class="pixel-house h2">
        <div class="roof"></div>
        <div class="body">
          <div class="window w1"></div>
          <div class="window w2"></div>
          <div class="door"></div>
        </div>
      </div>

      <div class="pipe p1"></div>
      <div class="pipe p2"></div>

      <div class="brick-strip">
        <div class="brick"></div>
        <div class="question-block"></div>
        <div class="brick"></div>
      </div>
    </div>

    <div class="floating-coins" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <main class="container page-shell">
        <header class="pixel-header" aria-label="Games arcade header">
          <div class="header-bar">
            <h1 class="games-heading">Simple JavaScript Games</h1>
            <div class="coin-row" aria-hidden="true">
              <span class="coin"></span>
              <span class="coin"></span>
              <span class="coin"></span>
            </div>
          </div>
        </header>
    
        <div class="card-container">
            <div class="card">
                <img src="images/1.png" class="card-img-top" alt="2048 Game">
                <div class="card-body">
                  <h5 class="card-title">2048 Game</h5>
                  <a href="2048 Game/index.html" class="btn btn-primary">Tap to Play <span class="play-arrow">▶</span></a>
                </div>
            </div>
            <div class="card">
              <img src="images/2.png" class="card-img-top" alt="Breakout Game">
              <div class="card-body">
                <h5 class="card-title">Breakout Game</h5>
                <a href="Breakout Game/index.html" class="btn btn-primary">Tap to Play <span class="play-arrow">▶</span></a>
              </div>
          </div>
          <div class="card">
            <img src="images/3.png" class="card-img-top" alt="CatchtheBall Game">
            <div class="card-body">
              <h5 class="card-title">Catch the Ball Game</h5>
              <a href="Catch the Ball/index.html" class="btn btn-primary">Tap to Play <span class="play-arrow">▶</span></a>
            </div>
        </div>
        <div class="card">
          <img src="images/4.png" class="card-img-top" alt="FlappyBird Game">
          <div class="card-body">
            <h5 class="card-title">Flappy Bird Game</h5>
            <a href="Flappy Bird/index.html" class="btn btn-primary">Tap to Play <span class="play-arrow">▶</span></a>
          </div>
      </div>
      <div class="card">
        <img src="images/5.png" class="card-img-top" alt="Memory Game">
        <div class="card-body">
          <h5 class="card-title">Memory Game</h5>
          <a href="Memory Game/index.html" class="btn btn-primary">Tap to Play <span class="play-arrow">▶</span></a>
        </div>
    </div>
    <div class="card">
      <img src="images/6.png" class="card-img-top" alt="Pong Game">
      <div class="card-body">
        <h5 class="card-title">Pong Game</h5>
        <a href="Pong Game/index.html" class="btn btn-primary">Tap to Play <span class="play-arrow">▶</span></a>
      </div>
  </div>
  <div class="card">
    <img src="images/7.png" class="card-img-top" alt="RockPaperScissors Game">
    <div class="card-body">
      <h5 class="card-title">Rock-Paper-Scissors Game</h5>
      <a href="Rock-Paper-Scissors/index.html" class="btn btn-primary">Tap to Play <span class="play-arrow">▶</span></a>
    </div>
</div>
<div class="card">
  <img src="images/8.png" class="card-img-top" alt="TicTacToe Game">
  <div class="card-body">
    <h5 class="card-title">Tic-Tac-Toe Game</h5>
    <a href="Tic-Tac-Toe/index.html" class="btn btn-primary">Tap to Play <span class="play-arrow">▶</span></a>
  </div>
</div>

            <!-- Add more cards here as needed -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
