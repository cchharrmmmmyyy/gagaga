<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Bird</title>
  <style>
    :root {
      --bg: #87CEEB;
      --text: #333;
      --card-bg: #fff;
      --card-shadow: rgba(0,0,0,0.1);
    }

    [data-theme="dark"] {
      --bg: #0f0f23;
      --text: #e0e0e0;
      --card-bg: #1a1a2e;
      --card-shadow: rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, sans-serif;
    }

    .game-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background-color: #87CEEB;
      image-rendering: pixelated;
    }

    .nav-button,
    .theme-toggle {
      position: fixed;
      padding: 8px 14px;
      border: 4px solid #1B1B2F;
      border-radius: 0;
      background: #FFF3C4;
      color: #1B1B2F;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 4px 4px 0 rgba(27,27,47,0.45);
      z-index: 100;
      transition: transform 0.12s, box-shadow 0.12s;
      font-weight: 700;
      font-family: "Courier New", monospace;
      image-rendering: pixelated;
    }

    [data-theme="dark"] .nav-button,
    [data-theme="dark"] .theme-toggle {
      background: #202052;
      color: #F7FCFF;
      border-color: #FFD23F;
      box-shadow: 4px 4px 0 rgba(255,210,63,0.3);
    }

    .nav-button {
      top: 15px;
      left: 15px;
    }

    .theme-toggle {
      top: 15px;
      right: 15px;
    }

    .nav-button:hover,
    .theme-toggle:hover {
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 rgba(27,27,47,0.45);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <button class="nav-button" id="homeButton">← 返回主页</button>
  <button class="theme-toggle" id="themeToggle">🌙 暗色</button>
  <script src="../game-platform.js"></script>
  <script src="flappybird.js"></script>
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const homeButton = document.getElementById('homeButton');
    const savedTheme = localStorage.getItem('flappyTheme') || 'light';
    document.documentElement.dataset.theme = savedTheme;
    themeToggle.textContent = savedTheme === 'light' ? '🌙 暗色' : '☀️ 亮色';

    homeButton.addEventListener('click', () => {
      window.location.href = '../index.html';
    });

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.dataset.theme;
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('flappyTheme', next);
      themeToggle.textContent = next === 'light' ? '🌙 暗色' : '☀️ 亮色';
    });
  </script>
</body>
</html>
