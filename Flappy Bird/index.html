<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Bird</title>
  <style>
    :root {
      --bg: #87CEEB;
      --text: #333;
      --card-bg: #fff;
      --card-shadow: rgba(0,0,0,0.1);
    }

    [data-theme="dark"] {
      --bg: #0f0f23;
      --text: #e0e0e0;
      --card-bg: #1a1a2e;
      --card-shadow: rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, sans-serif;
    }

    .game-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background-color: #87CEEB;
    }

    .theme-toggle {
      position: fixed;
      top: 15px;
      right: 15px;
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 2px 10px var(--card-shadow);
      z-index: 100;
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <button class="theme-toggle" id="themeToggle">🌙 暗色</button>
  <script src="../game-platform.js"></script>
  <script src="flappybird.js"></script>
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('flappyTheme') || 'light';
    document.documentElement.dataset.theme = savedTheme;
    themeToggle.textContent = savedTheme === 'light' ? '🌙 暗色' : '☀️ 亮色';

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.dataset.theme;
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('flappyTheme', next);
      themeToggle.textContent = next === 'light' ? '🌙 暗色' : '☀️ 亮色';
    });
  </script>
</body>
</html>
