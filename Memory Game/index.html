<!DOCTYPE html>
<html>
<head>
  <title>Memory Game</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --text: #333;
      --card-bg: #fff;
      --card-shadow: rgba(0,0,0,0.1);
      --primary: #FF7F00;
      --secondary: #FF4500;
      --card-back: linear-gradient(135deg, #FF7F00 0%, #FF4500 100%);
      --card-front: #fff;
      --beige: #FFF8E7;
    }

    [data-theme="dark"] {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --card-bg: #16213e;
      --card-shadow: rgba(0,0,0,0.3);
      --primary: #FF9D33;
      --secondary: #FF6B33;
      --card-back: linear-gradient(135deg, #FF9D33 0%, #FF6B33 100%);
      --card-front: #1a1a2e;
    }

    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .intro-modal {
      background: var(--card-bg);
      color: var(--text);
      padding: 40px;
      border-radius: 20px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .start-btn {
      padding: 14px 48px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--beige);
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px var(--card-shadow);
    }

    h1 {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 4px 15px var(--card-shadow);
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px var(--card-shadow);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      gap: 15px;
      justify-content: center;
      perspective: 1000px;
    }

    .stats {
      font-size: 18px;
      margin-bottom: 20px;
      color: var(--text);
    }

    .stats .timer {
      margin-left: 16px;
    }

    .mode-selector {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mode-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 12px 32px;
      border: 2px solid var(--primary);
      border-radius: 10px;
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      transition: all 0.25s;
      font-size: 15px;
    }

    .mode-btn .mode-icon {
      font-size: 20px;
    }

    .mode-btn .mode-label {
      font-size: 15px;
      font-weight: bold;
    }

    .mode-btn .mode-desc {
      font-size: 12px;
      opacity: 0.6;
      margin-left: auto;
    }

    .mode-btn:hover {
      border-color: var(--secondary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--card-shadow);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--beige);
      border-color: transparent;
    }

    .mode-btn.active .mode-desc {
      opacity: 0.85;
    }

    .intro-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 40px);
      padding: 20px 0;
    }

    .intro-container {
      display: flex;
      gap: 60px;
      align-items: center;
      max-width: 960px;
      width: 100%;
      padding: 0 20px;
    }

    .intro-left {
      flex: 1;
      text-align: left;
    }

    .intro-left h1 {
      text-align: left;
      margin-bottom: 16px;
    }

    .intro-desc {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
    }

    .intro-desc .tagline {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .intro-desc p {
      margin: 0 0 10px;
    }

    .intro-desc ul {
      padding-left: 18px;
      margin: 6px 0 0;
    }

    .intro-desc li {
      margin-bottom: 4px;
    }

    .intro-right {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 18px;
      max-width: 500px;
      width: 100%;
    }

    .game-screen {
      padding-top: 20px;
    }

    .card {
      width: 100px;
      height: 100px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 36px;
      box-shadow: 0 4px 15px var(--card-shadow);
    }

    .card-back {
      background: var(--card-back);
      color: white;
    }

    .card-front {
      background: var(--card-front);
      color: var(--text);
      transform: rotateY(180deg);
      border: 3px solid var(--primary);
    }

    .card.matched .card-front {
      border-color: #4CAF50;
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
      animation: matchPulse 0.5s ease;
    }

    .card.wrong {
      animation: shake 0.5s ease;
    }

    @keyframes matchPulse {
      0%, 100% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: rotateY(180deg) translateX(0); }
      25% { transform: rotateY(180deg) translateX(-5px); }
      75% { transform: rotateY(180deg) translateX(5px); }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">🌙 暗色</button>

  <div id="introScreen" class="intro-screen">
    <div class="intro-container">
      <div class="intro-left">
        <h1>Memory Game</h1>
        <div class="intro-desc">
          <p class="tagline">经典翻牌配对游戏，考验你的记忆力与专注力！</p>
          <p>记忆游戏（Concentration）起源于 1959 年，由德国 Ravensburger 出版的桌游《Memory®》风靡全球。你需要记住每张牌的位置，以最少的步数找出所有配对。</p>
          <p>每局棋盘随机排列，永远不重复。8 步完美通关 —— 你能做到吗？</p>
        </div>
      </div>
      <div class="intro-right">
        <div class="mode-selector">
          <button class="mode-btn active" data-diff="casual">
            <span class="mode-icon">🎮</span>
            <span class="mode-label">娱乐模式</span>
            <span class="mode-desc">不限时</span>
          </button>
          <button class="mode-btn" data-diff="easy">
            <span class="mode-icon">⏱</span>
            <span class="mode-label">简单</span>
            <span class="mode-desc">60秒</span>
          </button>
          <button class="mode-btn" data-diff="normal">
            <span class="mode-icon">⏱</span>
            <span class="mode-label">普通</span>
            <span class="mode-desc">45秒</span>
          </button>
          <button class="mode-btn" data-diff="hard">
            <span class="mode-icon">⏱</span>
            <span class="mode-label">困难</span>
            <span class="mode-desc">30秒</span>
          </button>
        </div>
        <button class="start-btn" id="startBtn">开始游戏</button>
      </div>
    </div>
  </div>

  <div id="gameScreen" class="game-screen" style="display:none">
    <div class="stats">
      步数：<span id="movesCount">0</span>
      <span class="timer">⏱ <span id="timerDisplay">45</span>s</span>
    </div>
    <div class="grid" id="gameGrid"></div>
  </div>

  <script src="memory.js"></script>
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.dataset.theme = savedTheme;
    updateThemeButton(savedTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.dataset.theme;
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = newTheme;
      localStorage.setItem('theme', newTheme);
      updateThemeButton(newTheme);
    });

    function updateThemeButton(theme) {
      themeToggle.textContent = theme === 'light' ? '🌙 暗色' : '☀️ 亮色';
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.mode-btn.active').classList.remove('active');
        btn.classList.add('active');
      });
    });

    document.getElementById('startBtn').addEventListener('click', () => {
      const selected = document.querySelector('.mode-btn.active').dataset.diff;
      startGame(selected);
    });
  </script>
</body>
</html>
