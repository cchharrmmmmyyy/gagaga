<!DOCTYPE html>
<html>
<head>
  <title>Memory Game</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --text: #333;
      --card-bg: #fff;
      --card-shadow: rgba(0,0,0,0.1);
      --primary: #667eea;
      --secondary: #764ba2;
      --card-back: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-front: #fff;
    }

    [data-theme="dark"] {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --card-bg: #16213e;
      --card-shadow: rgba(0,0,0,0.3);
      --primary: #a18cd1;
      --secondary: #fbc2eb;
      --card-back: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
      --card-front: #1a1a2e;
    }

    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .intro-modal {
      background: var(--card-bg);
      color: var(--text);
      padding: 40px;
      border-radius: 20px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .intro-rules {
      text-align: left;
      margin: 20px 0;
      line-height: 2;
      font-size: 16px;
    }

    .intro-rules ul {
      padding-left: 20px;
    }

    .start-btn {
      padding: 12px 40px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px var(--card-shadow);
    }

    h1 {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 4px 15px var(--card-shadow);
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px var(--card-shadow);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      gap: 15px;
      justify-content: center;
      perspective: 1000px;
    }

    .card {
      width: 100px;
      height: 100px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 36px;
      box-shadow: 0 4px 15px var(--card-shadow);
    }

    .card-back {
      background: var(--card-back);
      color: white;
    }

    .card-front {
      background: var(--card-front);
      color: var(--text);
      transform: rotateY(180deg);
      border: 3px solid var(--primary);
    }

    .card.matched .card-front {
      border-color: #4CAF50;
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
      animation: matchPulse 0.5s ease;
    }

    .card.wrong {
      animation: shake 0.5s ease;
    }

    @keyframes matchPulse {
      0%, 100% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: rotateY(180deg) translateX(0); }
      25% { transform: rotateY(180deg) translateX(-5px); }
      75% { transform: rotateY(180deg) translateX(5px); }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">🌙 暗色</button>
  <h1>Memory Game</h1>
  <div id="introOverlay" class="overlay">
    <div class="intro-modal">
      <div class="intro-rules">
        <p>翻开卡片，找到所有配对的图案！</p>
        <ul>
          <li>每次点击翻开两张卡片</li>
          <li>两张图案相同即为配对成功</li>
          <li>配对全部 8 对卡片即为胜利</li>
        </ul>
      </div>
      <button class="start-btn" id="startBtn">开始游戏</button>
    </div>
  </div>
  <div class="grid" id="gameGrid"></div>
  <script src="memory.js"></script>
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.dataset.theme = savedTheme;
    updateThemeButton(savedTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.dataset.theme;
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = newTheme;
      localStorage.setItem('theme', newTheme);
      updateThemeButton(newTheme);
    });

    function updateThemeButton(theme) {
      themeToggle.textContent = theme === 'light' ? '🌙 暗色' : '☀️ 亮色';
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('introOverlay').remove();
      createBoard();
    });
  </script>
</body>
</html>
