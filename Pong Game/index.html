<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Pong Adventure</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #070914;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #fff6ce;
      font-family: "Courier New", Consolas, monospace;
    }

    .home-button {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 20;
      padding: 10px 14px;
      border: 4px solid #05070d;
      background: #e23b2f;
      color: #fff6ce;
      box-shadow: 4px 4px 0 #05070d;
      font: 900 14px/1 "Courier New", Consolas, monospace;
      text-decoration: none;
      text-shadow: 2px 2px 0 #752016;
    }

    .home-button:hover,
    .home-button:focus-visible {
      background: #ff563f;
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 #05070d;
    }

    .shell {
      width: min(100vw, 980px);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #101a38;
    }

    .cabinet {
      width: fit-content;
      max-width: 100%;
      padding: 12px;
      border: 6px solid #05070d;
      background: #1b243d;
      box-shadow:
        0 0 0 4px #536489,
        0 0 0 8px #10172b,
        12px 12px 0 #000;
    }

    .marquee {
      height: 34px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 10px;
      padding: 0 10px;
      border: 4px solid #05070d;
      background: #e23b2f;
      color: #fff6ce;
      text-shadow: 2px 2px 0 #752016;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
    }

    .marquee small {
      color: #ffe86b;
      font-size: 11px;
      text-shadow: 2px 2px 0 #7a4a00;
      white-space: nowrap;
    }

    canvas {
      display: block;
      width: 800px;
      height: 400px;
      max-width: calc(100vw - 64px);
      max-height: calc(100vh - 128px);
      aspect-ratio: 2 / 1;
      border: 4px solid #05070d;
      background: #5cc8ff;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 10px;
      color: #fff6ce;
      font-size: 12px;
      line-height: 1.25;
      text-shadow: 2px 2px 0 #05070d;
    }

    .controls span {
      min-width: 0;
      padding: 7px 8px;
      border: 3px solid #05070d;
      background: #26385f;
      box-shadow: 4px 4px 0 #05070d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 680px) {
      .home-button {
        top: 8px;
        left: 8px;
        padding: 8px 10px;
        font-size: 11px;
      }
      .shell { padding: 8px; }
      .cabinet {
        padding: 8px;
        border-width: 4px;
        box-shadow: 0 0 0 3px #536489, 0 0 0 6px #10172b, 8px 8px 0 #000;
      }
      .marquee {
        height: 30px;
        font-size: 13px;
      }
      .marquee small { display: none; }
      canvas {
        max-width: calc(100vw - 36px);
        max-height: calc(100vh - 118px);
      }
      .controls {
        grid-template-columns: 1fr;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <a class="home-button" href="../index.html" aria-label="返回主页面">&larr; HOME</a>
  <main class="shell">
    <section class="cabinet" aria-label="Pixel Pong Adventure game">
      <div class="marquee">
        <span>PIXEL PONG ADVENTURE</span>
        <small>QUEST + VERSUS</small>
      </div>
      <canvas id="gameCanvas" width="800" height="400"></canvas>
      <div class="controls">
        <span>Quest: W/S or arrows move, F/SPACE skill, ENTER serve</span>
        <span>Versus: P1 W/S+F&nbsp;&nbsp; P2 arrows+/&nbsp;&nbsp; P pause</span>
      </div>
    </section>
  </main>
  <script src="../game-platform.js"></script>
  <script src="pong.js"></script>
</body>
</html>
