<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="game-wrapper">
        <header class="game-header">
            <div class="title-section">
                <h1 class="game-title">2048</h1>
                <p class="game-subtitle">合并数字，挑战极限</p>
            </div>
            <div class="score-section">
                <div class="score-box">
                    <span class="score-label">分数</span>
                    <span class="score-value" id="current-score">0</span>
                </div>
                <div class="score-box best">
                    <span class="score-label">最高</span>
                    <span class="score-value" id="best-score">0</span>
                </div>
            </div>
        </header>

        <div class="controls">
            <button class="new-game-btn" id="new-game-btn">
                <span>新游戏</span>
            </button>
        </div>

        <div class="game-container" id="game-container"></div>

        <div class="game-over-overlay" id="game-over-overlay">
            <div class="game-over-content">
                <h2 class="game-over-title" id="game-over-title">游戏结束</h2>
                <p class="game-over-score">最终分数: <span id="final-score">0</span></p>
                <button class="try-again-btn" id="try-again-btn">再试一次</button>
            </div>
        </div>

        <div class="win-overlay" id="win-overlay">
            <div class="win-content">
                <h2 class="win-title">🎉 恭喜通关!</h2>
                <p class="win-message">你成功达到了 2048!</p>
                <button class="continue-btn" id="continue-btn">继续游戏</button>
            </div>
        </div>

        <div class="instructions">
            <p><strong>玩法说明:</strong> 使用 <span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span> 方向键滑动方块，相同数字会合并相加</p>
        </div>

        <footer class="game-footer">
            <p>用方向键或滑动屏幕来移动方块</p>
        </footer>
    </div>
    <script src="../game-platform.js"></script>
    <script src="2048.js"></script>
</body>
</html>
