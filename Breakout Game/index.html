<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080810;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    .game-wrapper {
      background: linear-gradient(145deg, #12122a, #0a0a1e);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        0 0 60px rgba(100, 100, 255, 0.08),
        inset 0 0 60px rgba(100, 100, 255, 0.03),
        0 20px 60px rgba(0,0,0,0.6);
      position: relative;
    }
    .game-wrapper::before {
      content: '';
      position: absolute;
      top: -1px; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(100,200,255,0.3), transparent);
      border-radius: 50%;
    }
    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      width: 800px;
      height: 600px;
      box-shadow:
        inset 0 0 30px rgba(0,0,0,0.5),
        0 0 40px rgba(80, 120, 255, 0.05);
    }
    .controls {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      padding: 0 6px;
    }
    .controls span {
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.03);
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">
      <span>← → 移动挡板</span>
      <span>SPACE 发射 · P 暂停</span>
    </div>
  </div>
  <script src="breakout.js"></script>
</body>
</html>
