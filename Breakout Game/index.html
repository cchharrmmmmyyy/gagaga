<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Mario Breakout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        linear-gradient(#5B94D4 0 58%, #7AC943 58% 64%, #B86F36 64%),
        #5B94D4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', Consolas, monospace;
      overflow: hidden;
    }
    .game-wrapper {
      background: #E52521;
      padding: 14px;
      border-radius: 0;
      border: 6px solid #111;
      box-shadow:
        0 0 0 8px #F5C842,
        0 0 0 14px #111,
        12px 14px 0 rgba(0,0,0,0.28);
      position: relative;
    }
    .game-wrapper::before {
      content: 'MARIO BREAKOUT';
      position: absolute;
      top: -44px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: #1E5AA8;
      border: 4px solid #111;
      box-shadow: 4px 4px 0 #111;
      padding: 6px 18px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      white-space: nowrap;
    }
    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 0;
      width: 800px;
      height: 600px;
      border: 5px solid #111;
      image-rendering: pixelated;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.22);
    }
    .controls {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      gap: 14px;
      padding: 0 6px;
    }
    .controls span {
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: #1E5AA8;
      padding: 6px 16px;
      border-radius: 0;
      border: 3px solid #111;
      box-shadow: 3px 3px 0 #111;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">
      <span>LEFT / RIGHT / MOUSE</span>
      <span>SPACE START - P PAUSE</span>
    </div>
  </div>
  <script src="breakout.js"></script>
</body>
</html>
