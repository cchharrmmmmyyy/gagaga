<!DOCTYPE html>
<html>
<head>
  <title>Tic-Tac-Toe</title>
  <style>
    body {
      text-align: center;
      background: #e2e8f0;
      font-family: "Microsoft Yahei", sans-serif;
      padding-top: 30px;
    }
    canvas {
      background: #f7f9fc;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    h1 {
      color: #1e293b;
      margin-bottom: 15px;
    }
    #status {
      font-size: 20px;
      font-weight: bold;
      margin: 15px 0;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div id="status">轮到 X 落子</div>
  <canvas id="gameCanvas" width="300" height="300"></canvas>
  <script src="../game-platform.js"></script>
  <script src="tictactoe.js"></script>
</body>
</html>
